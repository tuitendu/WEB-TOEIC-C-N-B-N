<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOEIC 600 Vocabulary - Danh sách chủ đề</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Loading Animation -->
  <div id="loading-overlay">
    <div class="spinner-wrapper">
      <div class="custom-spinner"></div>
      <h5 class="fw-semibold text-muted">Đang tải danh sách chủ đề...</h5>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-rocket-takeoff-fill"></i>
        <span>TOEIC 600 Vocabulary</span>
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link" href="index.html"><i class="bi bi-house-door-fill"></i> Trang chủ</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="topics.html"><i class="bi bi-journal-bookmark-fill"></i> Chủ đề</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="quiz.html"><i class="bi bi-patch-question-fill"></i> Trắc nghiệm</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="review.html"><i class="bi bi-arrow-repeat"></i> Ôn tập</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="progress.html"><i class="bi bi-bar-chart-fill"></i> Tiến độ</a>
          </li>
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
            <button id="theme-toggle-btn" class="btn btn-outline-secondary border-0 rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" title="Đổi giao diện">
              <i class="bi bi-moon-stars-fill"></i>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page Content -->
  <main class="container py-4 page-fade">
    
    <!-- Search & Filter Controls Header -->
    <header class="row mb-4 align-items-center g-3">
      <div class="col-12 col-md-4">
        <h2 class="fw-bold m-0"><i class="bi bi-journal-album text-primary me-2"></i>Danh sách chủ đề</h2>
      </div>
      
      <!-- Search Input -->
      <div class="col-12 col-sm-6 col-md-4">
        <div class="input-group">
          <span class="input-group-text bg-white border-2 border-end-0 border-color rounded-start-4 dark-input-border" style="transition: none;">
            <i class="bi bi-search text-muted"></i>
          </span>
          <input type="text" id="search-box" class="form-control border-2 border-start-0 border-color rounded-end-4 p-2 fs-6 dark-input" placeholder="Tìm chủ đề hoặc từ vựng..." style="box-shadow: none;">
        </div>
      </div>
      
      <!-- Filter Selector -->
      <div class="col-12 col-sm-6 col-md-4">
        <div class="d-flex justify-content-sm-end gap-2">
          <select id="filter-status" class="form-select border-2 border-color rounded-4 p-2 dark-input" style="width: auto; box-shadow: none;">
            <option value="all">Tất cả trạng thái</option>
            <option value="completed">Đã hoàn thành</option>
            <option value="studying">Đang học</option>
            <option value="unstarted">Chưa học</option>
          </select>
        </div>
      </div>
    </header>

    <!-- Grid List Section -->
    <section class="row">
      <div class="col-12">
        <div class="row g-4" id="topics-cards-container">
          <!-- Populated dynamically via JS -->
        </div>
        
        <!-- Empty search state -->
        <div id="empty-search-state" class="empty-state d-none">
          <i class="bi bi-search-heart"></i>
          <h5 class="fw-bold text-muted mb-1">Không tìm thấy kết quả nào</h5>
          <p class="text-muted small">Hãy thử tìm với các từ khóa khác xem sao nhé!</p>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="py-4 border-top border-color text-center text-muted mt-5">
    <div class="container">
      <p class="m-0 small">&copy; 2026 TOEIC 600 Vocabulary. Phát triển bởi Antigravity Team.</p>
    </div>
  </footer>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  <!-- Storage and Audio Helpers -->
  <script src="js/storage.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/main.js"></script>

  <script>
    // Topics Listing Logic
    document.addEventListener('DOMContentLoaded', async () => {
      const db = await App.getDatabase();
      if (!db || db.length === 0) return;

      const container = document.getElementById('topics-cards-container');
      const searchBox = document.getElementById('search-box');
      const filterStatus = document.getElementById('filter-status');
      const emptyState = document.getElementById('empty-search-state');

      // Function to render topics based on criteria
      function renderTopics(searchQuery = '', statusFilter = 'all') {
        container.innerHTML = '';
        const learnedList = StorageManager.getLearnedWords();
        const completedTopics = StorageManager.getCompletedTopics();
        
        let matchCount = 0;

        db.forEach(t => {
          const topicWords = t.words.map(w => w.word);
          const topicLearnedCount = topicWords.filter(w => learnedList.includes(w)).length;
          const progress = topicWords.length > 0 ? Math.round((topicLearnedCount / topicWords.length) * 100) : 0;
          
          // Determine status
          let status = 'unstarted';
          if (progress === 100) {
            status = 'completed';
            // Sync completion in storage just in case
            StorageManager.setTopicCompleted(t.topic, true);
          } else if (progress > 0) {
            status = 'studying';
            StorageManager.setTopicCompleted(t.topic, false);
          } else {
            StorageManager.setTopicCompleted(t.topic, false);
          }

          // Apply filters
          if (statusFilter !== 'all' && statusFilter !== status) return;

          // Apply search (filters by topic title or by word names inside)
          const searchLower = searchQuery.toLowerCase().trim();
          let queryMatches = true;
          if (searchLower) {
            const matchesTopic = t.topic.toLowerCase().includes(searchLower);
            const matchesWord = t.words.some(w => 
              w.word.toLowerCase().includes(searchLower) || 
              w.meaning.toLowerCase().includes(searchLower)
            );
            queryMatches = matchesTopic || matchesWord;
          }

          if (!queryMatches) return;
          matchCount++;

          // Card UI construction
          const col = document.createElement('div');
          col.className = 'col-12 col-md-6 col-lg-4';
          
          // Complete Badge
          const isDone = (status === 'completed');
          const badgeHTML = isDone 
            ? `<div class="d-flex align-items-center justify-content-center text-success border border-success bg-success bg-opacity-10 rounded-pill px-2 py-1 small fw-semibold" style="gap: 4px;">
                 <i class="bi bi-check-circle-fill"></i> Hoàn thành
               </div>`
            : progress > 0 
              ? `<div class="d-flex align-items-center justify-content-center text-warning border border-warning bg-warning bg-opacity-10 rounded-pill px-2 py-1 small fw-semibold" style="gap: 4px;">
                   <i class="bi bi-hourglass-split"></i> Đang học
                 </div>`
              : `<div class="text-muted small fw-medium">Chưa bắt đầu</div>`;

          col.innerHTML = `
            <div class="game-card h-100 d-flex flex-column justify-content-between">
              <div>
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <h5 class="fw-bold m-0 text-truncate" style="max-width: 60%;">${t.topic}</h5>
                  ${badgeHTML}
                </div>
                <div class="text-muted small mb-3 d-flex align-items-center gap-2">
                  <i class="bi bi-card-text"></i>
                  <span>${t.words.length} từ vựng</span>
                </div>
                
                <div class="mb-3">
                  <div class="d-flex justify-content-between mb-1 small text-muted">
                    <span>Đã thuộc: ${topicLearnedCount}/${t.words.length}</span>
                    <span>${progress}%</span>
                  </div>
                  <div class="progress-container" style="height: 12px;">
                    <div class="progress-bar-animated" style="width: ${progress}%;"></div>
                  </div>
                </div>
              </div>
              
              <div class="d-flex gap-2 mt-4">
                <a href="study.html?topic=${encodeURIComponent(t.topic)}" class="btn btn-sm btn-game btn-game-primary flex-fill d-flex align-items-center justify-content-center gap-1">
                  <i class="bi bi-book"></i> Học từ
                </a>
                <a href="quiz.html?topic=${encodeURIComponent(t.topic)}" class="btn btn-sm btn-game btn-game-outline flex-fill d-flex align-items-center justify-content-center gap-1">
                  <i class="bi bi-patch-question"></i> Quiz
                </a>
              </div>
            </div>
          `;
          container.appendChild(col);
        });

        // Toggle empty state
        if (matchCount === 0) {
          emptyState.classList.remove('d-none');
        } else {
          emptyState.classList.add('d-none');
        }
      }

      // Event bindings
      searchBox.addEventListener('input', (e) => {
        renderTopics(e.target.value, filterStatus.value);
      });

      filterStatus.addEventListener('change', (e) => {
        renderTopics(searchBox.value, e.target.value);
      });

      // Initial render
      renderTopics();
    });
  </script>

</body>
</html>
